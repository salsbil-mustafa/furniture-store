<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh; 
        }

        .login-card {
        background: #fff;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px;
        text-align: center;
         }

        input { 
        width: 100%; 
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 5px; 
        }

        .btn-login {
        width: 100%;
        padding: 12px;
        background: #b08968;
        color: white;
        border: none; 
        border-radius: 5px;
        cursor: pointer;
        }

    </style>
</head>
<body>
    <div class="login-card">
        <h2> Welcome</h2>
        <p>Please log in to continue shopping</p>
        <input type="email" placeholder="email ">
        <input type="password" placeholder="password" >
        <button class="btn-login" onclick="location.href='index.html'">login</button>
    </div>
</body>
</html>
